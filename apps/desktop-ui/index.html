<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TeamView Channel Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="rail" aria-label="Channels">
        <div class="brand">
          <span class="brand-mark">TV</span>
          <span>TeamView</span>
        </div>
        <div class="channel-list" id="channelList"></div>
      </aside>

      <section class="stage" aria-label="Screen share">
        <header class="topbar">
          <div>
            <p class="eyebrow">Channel</p>
            <h1 id="channelTitle">General</h1>
          </div>
          <div class="status-pill" id="connectionState">Connected</div>
        </header>

        <section class="preview-panel">
          <div class="preview-toolbar">
            <div>
              <p class="eyebrow">Screen</p>
              <h2 id="screenTitle">Primary monitor</h2>
            </div>
            <div class="metrics">
              <span id="resolutionMetric">1280x720</span>
              <span id="fpsMetric">30 fps</span>
              <span id="latencyMetric">42 ms</span>
            </div>
          </div>
          <canvas id="screenPreview" width="1280" height="720"></canvas>
        </section>

        <section class="controls" aria-label="Media controls">
          <button class="control active" id="shareButton" type="button">
            <span class="icon">▣</span>
            <span>Share</span>
          </button>
          <button class="control" id="muteButton" type="button">
            <span class="icon">●</span>
            <span>Mute</span>
          </button>
          <button class="control" id="deafenButton" type="button">
            <span class="icon">◐</span>
            <span>Deafen</span>
          </button>
          <button class="control" id="pttButton" type="button">
            <span class="icon">▲</span>
            <span>PTT</span>
          </button>
        </section>
      </section>

      <aside class="voice" aria-label="Voice participants">
        <section class="voice-meter">
          <div>
            <p class="eyebrow">Voice</p>
            <h2 id="voiceState">Speaking</h2>
          </div>
          <canvas id="voiceCanvas" width="360" height="96"></canvas>
        </section>
        <section class="participants">
          <div class="section-head">
            <h2>Participants</h2>
            <span id="participantCount">0</span>
          </div>
          <div id="participantList"></div>
        </section>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
